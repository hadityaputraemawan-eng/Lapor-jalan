<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirim Laporan</title>
<link rel="icon" href="asset/logo.png" type="image/png">

<style>
  /* Reset dasar agar tidak ada margin bawaan browser */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    background: #f5f7f7;
    padding-top: 80px; /* Memberi ruang agar konten tidak tertutup navbar fixed */
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- NAVBAR (DIPERBAIKI) --- */
  nav {
    background: #ffffff;
    width: 100%;
    height: 70px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: fixed; /* Membuat navbar tetap di atas saat scroll */
    top: 0;
    left: 0;
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .nav-wrapper {
    width: 90%;
    max-width: 1100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo-section {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-section img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 600;
    color: #000;
    text-decoration: none;
  }

  .logo span {
    color: #1abc9c;
  }

  .menu {
    list-style: none;
    display: flex;
    gap: 20px;
  }

  .menu a {
    color: #333;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
  }

  .menu a:hover {
    color: #1abc9c;
  }

  /* --- KONTEN UTAMA --- */
  .main-content {
    width: 400px; /* Sesuai keinginan awal Anda */
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    margin-bottom: 50px;
  }

  /* UPLOAD */
  .upload-box {
    border: 2px dashed #ccc;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 10px;
  }

  .preview-container {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .preview-container img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 5px;
  }

  /* RADIO MODERN */
  .kategori {
    display: flex;
    gap: 10px;
    margin: 15px 0;
  }

  .kategori input {
    display: none;
  }

  .kategori label {
    flex: 1;
    text-align: center;
    padding: 10px;
    background: #eee;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
  }

  .kategori input:checked + label {
    background: teal;
    color: white;
  }

  /* INPUT */
  .row {
    display: flex;
    gap: 10px;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
  }

  /* BUTTON */
  button {
    width: 100%;
    padding: 10px;
    background: teal;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
  }

  /* CARD HISTORY */
  .card {
    background: #f9f9f9;
    padding: 15px;
    margin-top: 10px;
    border-radius: 6px;
    border-left: 5px solid teal;
  }

  .history-img {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .history-img img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 4px;
  }

  .hapus-btn {
    background: #e74c3c;
    margin-top: 10px;
  }
  footer {
  background: #2c3e50;
  color: white;
  text-align: center;
  padding: 20px;
  width: 100%;
  }
</style>
</head>

<body>

  <nav>
    <div class="nav-wrapper">
      <a href="#" class="logo-section">
        <img src="asset/logo.png" alt="Logo">
        <div class="logo">Lapor<span>Jalan</span>.</div>
      </a>
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="lapor.html">Lapor</a></li>
        
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <h2>Kirim Laporan</h2>

    <div class="upload-box" id="uploadBox">
      <input type="file" id="fileInput" multiple hidden>
      <p>Klik upload gambar</p>
      <div class="preview-container" id="preview"></div>
    </div>

    <div class="kategori">
      <input type="radio" id="jalan" name="kategori" value="Jalan" checked>
      <label for="jalan">Jalan</label>

      <input type="radio" id="trotoar" name="kategori" value="Trotoar">
      <label for="trotoar">Trotoar</label>

      <input type="radio" id="jembatan" name="kategori" value="Jembatan">
      <label for="jembatan">Jembatan</label>
    </div>

    <div class="row">
      <input type="text" id="nama" placeholder="Nama">
      <input type="date" id="tanggal">
    </div>

    <textarea id="deskripsi" placeholder="Deskripsi" rows="3"></textarea>

    <button id="submitBtn">Kirim</button>
    <p id="msg" style="text-align:center; margin-top:5px;"></p>

    <button onclick="hapusSemua()" style="background:#333; margin-top:10px;">
      Hapus Semua Histori
    </button>

    <h3 style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">Histori</h3>
    <div id="historyList"></div>
  </div>

  <script>
    // Script tetap sama seperti logika asli Anda
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const uploadBox = document.getElementById("uploadBox");
    let imagesBase64 = [];

    uploadBox.onclick = () => fileInput.click();

    fileInput.onchange = () => {
      preview.innerHTML = "";
      imagesBase64 = [];
      Array.from(fileInput.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          imagesBase64.push(e.target.result);
          const img = document.createElement("img");
          img.src = e.target.result;
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    };

    function getKategori() {
      return document.querySelector('input[name="kategori"]:checked').value;
    }

    function loadHistory() {
      const data = JSON.parse(localStorage.getItem("laporan")) || [];
      const historyList = document.getElementById("historyList");
      historyList.innerHTML = "";

      data.forEach((item, index) => {
        let imagesHTML = "";
        if (item.images) {
          item.images.forEach(img => {
            imagesHTML += `<img src="${img}">`;
          });
        }

        const div = document.createElement("div");
        div.classList.add("card");
        div.innerHTML = `
          <b>${item.nama}</b> <small>(${item.tanggal})</small><br>
          <span style="color:teal; font-weight:bold">${item.kategori}</span><br>
          <p style="font-size:0.9rem; margin:5px 0;">${item.deskripsi}</p>
          <small style="color:orange">Status: ${item.status}</small>
          <div class="history-img">${imagesHTML}</div>
          <button class="hapus-btn" onclick="hapusData(${index})">Hapus</button>
        `;
        historyList.appendChild(div);
      });
    }

    document.getElementById("submitBtn").onclick = () => {
      const nama = document.getElementById("nama").value;
      const tanggal = document.getElementById("tanggal").value;
      const deskripsi = document.getElementById("deskripsi").value;
      const msg = document.getElementById("msg");

      if (!nama || !tanggal || !deskripsi) {
        msg.innerText = "Isi semua!";
        msg.style.color = "red";
        return;
      }

      const laporan = {
        nama,
        tanggal,
        kategori: getKategori(),
        deskripsi,
        status: "Masih dalam antrian",
        images: imagesBase64
      };

      let data = JSON.parse(localStorage.getItem("laporan")) || [];
      data.push(laporan);
      localStorage.setItem("laporan", JSON.stringify(data));

      msg.innerText = "Berhasil!";
      msg.style.color = "green";
      
      // Reset form
      document.getElementById("nama").value = "";
      document.getElementById("tanggal").value = "";
      document.getElementById("deskripsi").value = "";
      preview.innerHTML = "";
      fileInput.value = "";
      imagesBase64 = [];

      loadHistory();
    };

    function hapusData(index) {
      let data = JSON.parse(localStorage.getItem("laporan")) || [];
      data.splice(index, 1);
      localStorage.setItem("laporan", JSON.stringify(data));
      loadHistory();
    }

    function hapusSemua() {
      if(confirm("Hapus semua histori?")) {
        localStorage.removeItem("laporan");
        loadHistory();
      }
    }

    loadHistory();
  </script>
   
</body>
</html>
